name: 🚀 Deploy — Production

on:
  # Trigger on semver tags: v1.0.0, v2.3.1, etc.
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

  # Also allow manual trigger with approval gate
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. v1.2.0)'
        required: true
      confirmed:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false          # NEVER cancel a production deploy

env:
  NODE_VERSION: '18'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # Safety gate for manual deploys
  validate-manual:
    name: 🛡️ Validate Manual Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirmed }}" != "DEPLOY" ]; then
            echo "❌ You must type DEPLOY to confirm production deployment"
            exit 1
          fi
          echo "✅ Production deployment confirmed"

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-manual]
    if: always() && (needs.validate-manual.result == 'success' || needs.validate-manual.result == 'skipped')

    environment:
      name: production
      url: https://cosmolearns.ca

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install & build Cloud Functions
        run: |
          npm ci --prefix functions
          npm run build --prefix functions

      # Final test run on production build
      - name: Run tests (final gate)
        run: npm test
        env:
          CI: true

      # Inject PRODUCTION config (live Stripe keys, prod Firebase)
      - name: Inject production config
        run: node scripts/inject-config.js --env production
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY_PROD }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          FIREBASE_PROJECT_ID:    ${{ secrets.FIREBASE_PROJECT_PROD }}

      # Create a pre-deployment backup tag in Firebase
      - name: Tag current production (backup)
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "Creating backup snapshot: backup-$TIMESTAMP"
          # In production you'd snapshot Firestore here if needed
          echo "BACKUP_TAG=backup-$TIMESTAMP" >> $GITHUB_ENV

      # Deploy in correct order: rules → functions → hosting
      - name: Deploy Firestore Rules & Indexes
        run: |
          npx firebase-tools deploy \
            --only firestore \
            --project ${{ secrets.FIREBASE_PROJECT_PROD }} \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive

      - name: Deploy Storage Rules
        run: |
          npx firebase-tools deploy \
            --only storage \
            --project ${{ secrets.FIREBASE_PROJECT_PROD }} \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive

      - name: Deploy Cloud Functions
        run: |
          npx firebase-tools deploy \
            --only functions \
            --project ${{ secrets.FIREBASE_PROJECT_PROD }} \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: hosting
        with:
          repoToken:          ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          projectId:          ${{ secrets.FIREBASE_PROJECT_PROD }}
          channelId:          live

      # Production smoke tests — hit critical endpoints
      - name: Production Smoke Tests
        run: |
          PROD_URL="https://cosmolearns.ca"
          echo "Testing $PROD_URL..."

          # Test 1: Homepage loads
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL")
          [ "$STATUS" = "200" ] && echo "✅ Homepage OK" || (echo "❌ Homepage failed: $STATUS" && exit 1)

          # Test 2: Check response time < 3s
          TIME=$(curl -s -o /dev/null -w "%{time_total}" "$PROD_URL")
          echo "⏱ Response time: ${TIME}s"

          # Test 3: Firebase Functions health
          FUNC_URL="https://us-central1-${{ secrets.FIREBASE_PROJECT_PROD }}.cloudfunctions.net/healthCheck"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUNC_URL")
          [ "$STATUS" = "200" ] && echo "✅ Functions OK" || echo "⚠️ Functions health check: $STATUS"

      # Get version tag for release notes
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      # Auto-create GitHub Release with changelog
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Cosmo Learns ${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 Cosmo Learns ${{ steps.version.outputs.version }}

            **Live at:** https://cosmolearns.ca

            ### What's New
            ${{ steps.changelog.outputs.changelog }}

            ### Deployment Info
            - **Deployed by:** @${{ github.actor }}
            - **Firebase Project:** `${{ secrets.FIREBASE_PROJECT_PROD }}`
            - **Commit:** `${{ github.sha }}`
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc.') }}
          generate_release_notes: true

      # Notify Slack — production deploy success
      - name: Notify Slack — Production Success
        if: success()
        uses: slackapi/slack-github-action@v3.0.2
        with:
          payload: |
            {
              "text": "🚀 *Cosmo Learns ${{ steps.version.outputs.version }}* is LIVE in Production!",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 Production Deploy Successful!" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ steps.version.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*URL:*\nhttps://cosmolearns.ca" },
                    { "type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🌐 View Production" },
                      "url": "https://cosmolearns.ca",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📋 Release Notes" },
                      "url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      # Notify Slack — production FAILED (alert everyone)
      - name: Notify Slack — Production FAILED 🚨
        if: failure()
        uses: slackapi/slack-github-action@v3.0.2
        with:
          payload: |
            {
              "text": "🚨 PRODUCTION DEPLOY FAILED — @here immediate attention needed!",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚨 Production Deploy FAILED" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*@here* — Production deployment failed and may need rollback." }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ steps.version.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🔍 View Logs" },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🔄 Rollback" },
                      "url": "https://github.com/${{ github.repository }}/actions/workflows/rollback.yml"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
