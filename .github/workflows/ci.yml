name: 🔍 CI — Lint, Test & Audit

on:
  push:
    branches: [main, develop, 'hotfix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true          # cancel older runs on same branch

env:
  NODE_VERSION: '18'
  FIREBASE_CLI_VERSION: '13.x'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

# ── 1. LINT & TYPE CHECK ──────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: ESLint (root)
        run: npm run lint --if-present

      - name: TypeScript check (functions)
        run: npm run build --prefix functions

      - name: Check HTML validity
        run: npx html-validate hosting/index.html --config .htmlvalidate.json || true


# ── 2. UNIT TESTS ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Run unit tests with coverage
        run: npm test -- --coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true


# ── 3. FIRESTORE RULES TESTS ──────────────────────────────────────────────────
  rules-test:
    name: 🔐 Firestore Rules Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_CLI_VERSION }}

      - name: Install test dependencies
        run: npm ci

      - name: Start Firestore Emulator & run rules tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-cosmo \
            "npm run test:rules"


# ── 4. SECURITY SCAN ─────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true          # warn but don't block on low/medium


# ── 5. LIGHTHOUSE PERFORMANCE AUDIT ──────────────────────────────────────────
  lighthouse:
    name: 🏠 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Serve app locally
        run: |
          npx serve hosting -p 4000 &
          sleep 3                         # wait for server to start

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4000
          budgetPath: .lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        id: lighthouse

      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            const summary = results.map(r => {
              const cats = r.summary;
              return `| ${r.url} | ${Math.round(cats.performance*100)} | ${Math.round(cats.accessibility*100)} | ${Math.round(cats['best-practices']*100)} | ${Math.round(cats.seo*100)} |`;
            }).join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🏠 Lighthouse Results\n\n| URL | Perf | A11y | Best Practices | SEO |\n|-----|------|------|----------------|-----|\n${summary}\n\n*Thresholds: Performance ≥80, Accessibility ≥90, Best Practices ≥90, SEO ≥80*`
            });


# ── 6. BUNDLE SIZE CHECK ──────────────────────────────────────────────────────
  bundle-size:
    name: 📦 Bundle Size Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check HTML bundle size
        run: |
          SIZE=$(wc -c < hosting/index.html)
          SIZE_KB=$((SIZE / 1024))
          echo "📦 index.html size: ${SIZE_KB}KB (${SIZE} bytes)"
          if [ $SIZE -gt 512000 ]; then
            echo "❌ Bundle too large! Max 500KB, got ${SIZE_KB}KB"
            exit 1
          fi
          echo "✅ Bundle size OK"

      - name: Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const size = execSync('wc -c < hosting/index.html').toString().trim();
            const kb = Math.round(parseInt(size) / 1024);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 📦 Bundle Size\n\n\`index.html\`: **${kb}KB** (limit: 500KB) ${kb < 500 ? '✅' : '❌'}`
            });
