name: 🔭 Preview Deploy (Pull Requests)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  preview:
    name: 🔭 Deploy Preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.details_url }}

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install & build Cloud Functions
        run: |
          npm ci --prefix functions
          npm run build --prefix functions

      # Inject staging environment variables into the HTML
      - name: Inject staging config
        run: node scripts/inject-config.js --env staging
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          FIREBASE_PROJECT_ID:    ${{ secrets.FIREBASE_PROJECT_STAGING }}

      # Deploy to a per-PR Firebase Hosting preview channel
      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy
        with:
          repoToken:          ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          projectId:          ${{ secrets.FIREBASE_PROJECT_STAGING }}
          channelId:          pr-${{ github.event.pull_request.number }}
          expires:            7d                    # preview link lives 7 days

      # Also deploy functions to staging
      - name: Deploy Functions to Staging
        run: |
          npx firebase-tools deploy \
            --only functions \
            --project ${{ secrets.FIREBASE_PROJECT_STAGING }} \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Post a rich comment on the PR with the preview URL and test info
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.details_url }}';
            const sha = context.sha.slice(0, 7);
            const actor = context.actor;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '## 🔭 Preview Deployment Ready!',
                '',
                `| | |`,
                `|---|---|`,
                `| 🌐 **Preview URL** | [${previewUrl}](${previewUrl}) |`,
                `| 🔀 **Commit** | \`${sha}\` |`,
                `| 👤 **Deployed by** | @${actor} |`,
                `| ⏱ **Expires** | 7 days |`,
                '',
                '### 🧪 Test Checklist',
                '- [ ] Pricing page renders with all 4 tiers',
                '- [ ] Google Sign-In flow works',
                '- [ ] Stripe payment modal opens',
                '- [ ] Apple Pay / Google Pay button appears (on supported device)',
                '- [ ] Cosmo voice mode activates',
                '- [ ] Quiz generates correctly',
                '- [ ] Parent dashboard loads for demo account',
                '',
                '*Preview will be cleaned up automatically when this PR is merged or closed.*'
              ].join('\n')
            });

  # Close the preview channel when PR is merged/closed
  cleanup-preview:
    name: 🧹 Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v6

      - name: Delete Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:          ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          projectId:          ${{ secrets.FIREBASE_PROJECT_STAGING }}
          channelId:          pr-${{ github.event.pull_request.number }}
          expires:            0d                    # 0d = delete immediately
